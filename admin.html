<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Channel React</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c15;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            padding: 30px 20px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1d2e;
            padding: 35px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }

        .login-container h2 {
            color: white;
            margin-bottom: 15px;
        }

        .login-container input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #0f111f;
            border: 1px solid #2d2f42;
            border-radius: 40px;
            color: white;
            font-size: 16px;
        }

        .login-container button {
            background: #8b5cf6;
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-panel {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }

        .header-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: #1a1d2e;
            padding: 20px 25px;
            border-radius: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-admin h2 {
            color: white;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-badge {
            background: #0f111f;
            padding: 6px 15px;
            border-radius: 40px;
            color: #c084fc;
            font-size: 13px;
        }

        .logout-btn {
            background: #ef4444;
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .refresh-btn {
            background: #3b82f6;
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .requests-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .request-card {
            background: #14182b;
            border-radius: 24px;
            padding: 20px 25px;
            border-left: 6px solid #f59e0b;
            transition: 0.2s;
        }

        .request-card.done {
            opacity: 0.6;
            border-left-color: #22c55e;
            background: #0f1222;
        }

        .request-card.rejected {
            display: none;
        }

        .wa-link {
            font-size: 15px;
            word-break: break-all;
            background: #0f111f;
            padding: 10px 14px;
            border-radius: 18px;
            font-family: monospace;
            color: #a855f7;
        }

        .emoji-list {
            font-size: 24px;
            letter-spacing: 5px;
            margin-top: 10px;
        }

        .timestamp {
            font-size: 12px;
            color: #7e84a3;
            margin-top: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 18px;
        }

        .btn-approve {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.1s;
        }

        .btn-approve:active {
            transform: scale(0.97);
        }

        .btn-reject {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .badge-pending {
            background: #f59e0b20;
            color: #fbbf24;
        }

        .badge-done {
            background: #22c55e20;
            color: #86efac;
        }

        .empty-state {
            color: white;
            text-align: center;
            padding: 50px;
            background: #14182b;
            border-radius: 28px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e1b2e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1100;
            border-left: 4px solid #a855f7;
            box-shadow: 0 5px 20px black;
        }
    </style>
</head>
<body>

<div class="login-container" id="loginBox">
    <h2>🔐 Admin Access</h2>
    <input type="password" id="tokenInput" placeholder="Masukkan Token">
    <button id="loginBtn">Masuk</button>
    <p style="color:#aaa; margin-top: 15px; font-size:12px">Token: Admin123#</p>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="header-admin">
        <h2>📋 Panel Request</h2>
        <div class="stats">
            <div class="stat-badge" id="pendingCount">Pending: 0</div>
            <div class="stat-badge" id="doneCount">Selesai: 0</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
            <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
    </div>
    <div class="requests-grid" id="requestsContainer">
        <div class="empty-state">Loading request...</div>
    </div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAJodnkdF_FiJ3bdUE2Jhpd91W6AnZ5KbI",
        authDomain: "chan-react.firebaseapp.com",
        databaseURL: "https://chan-react-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chan-react",
        storageBucket: "chan-react.firebasestorage.app",
        messagingSenderId: "479832015269",
        appId: "1:479832015269:web:c0aba3d54712a8465ca84c",
        measurementId: "G-X5LLJH01KF"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const requestsRef = database.ref('requests');

    let allRequests = [];

    // ========== AUTH ==========
    function checkAuth() {
        const token = localStorage.getItem('adminToken');
        if (token === 'Admin123#') {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            startListening();
        } else {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            localStorage.removeItem('adminToken');
        }
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const token = document.getElementById('tokenInput').value;
        if (token === 'Admin123#') {
            localStorage.setItem('adminToken', token);
            checkAuth();
        } else {
            alert('Token salah!');
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        checkAuth();
        // Hentikan listener
        if (window.requestsListener) {
            requestsRef.off('value', window.requestsListener);
        }
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
        showToast("🔄 Refresh manual");
        renderRequests();
    });

    // ========== REALTIME LISTENER DARI FIREBASE ==========
    function startListening() {
        // Listener untuk semua perubahan di requests
        window.requestsListener = requestsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                allRequests = [];
            } else {
                // Konversi ke array
                allRequests = Object.values(data).map(req => ({
                    ...req,
                    firebaseKey: Object.keys(data).find(key => data[key].id === req.id) || req.id
                }));
            }
            renderRequests();
            updateStats();
        });
    }

    function updateStats() {
        const pending = allRequests.filter(r => r.status === 'pending').length;
        const done = allRequests.filter(r => r.status === 'done').length;
        document.getElementById('pendingCount').innerHTML = `Pending: ${pending}`;
        document.getElementById('doneCount').innerHTML = `Selesai: ${done}`;
    }

    // ========== RENDER REQUEST ==========
    function renderRequests() {
        const container = document.getElementById('requestsContainer');
        
        if (!allRequests.length) {
            container.innerHTML = '<div class="empty-state">✨ Belum ada request masuk</div>';
            return;
        }

        // Urutkan dari yang terbaru (timestamp terbesar)
        const sorted = [...allRequests].sort((a, b) => b.timestamp - a.timestamp);
        
        // Tampilkan semua request (pending + done), tapi beda styling
        container.innerHTML = '';
        
        sorted.forEach(req => {
            const isPending = req.status === 'pending';
            const card = document.createElement('div');
            card.className = `request-card ${req.status === 'done' ? 'done' : ''}`;
            card.dataset.id = req.id;
            
            card.innerHTML = `
                <div class="badge ${isPending ? 'badge-pending' : 'badge-done'}">
                    ${isPending ? '⏳ Pending' : '✅ Selesai'}
                </div>
                <div class="wa-link">🔗 ${escapeHtml(req.waLink)}</div>
                <div class="emoji-list">${escapeHtml(req.emojis)}</div>
                <div class="timestamp">📅 ${new Date(req.timestamp).toLocaleString('id-ID')}</div>
                ${isPending ? `
                    <div class="action-buttons">
                        <button class="btn-approve" data-id="${req.id}" data-key="${req.firebaseKey}">✅ Kerjakan</button>
                        <button class="btn-reject" data-id="${req.id}" data-key="${req.firebaseKey}">❌ Tolak</button>
                    </div>
                ` : `
                    <div class="action-buttons">
                        <button class="btn-reject" data-id="${req.id}" data-key="${req.firebaseKey}" style="background:#6b7280;">🗑 Hapus</button>
                    </div>
                `}
            `;
            container.appendChild(card);
        });

        // Attach event listeners ke tombol yang baru di-render
        document.querySelectorAll('.btn-approve').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const key = btn.dataset.key;
                await processRequest(id, key, 'done');
            });
        });

        document.querySelectorAll('.btn-reject').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const key = btn.dataset.key;
                if (confirm('Tolak/hapus request ini?')) {
                    await rejectRequest(id, key);
                }
            });
        });
    }

    // ========== PROSES KERJAKAN (UPDATE STATUS JADI DONE) ==========
    async function processRequest(id, firebaseKey, newStatus) {
        try {
            // Update status di Firebase
            await requestsRef.child(firebaseKey).update({ 
                status: newStatus,
                processedAt: Date.now()
            });
            showToast(`✅ Request ${id.substring(0,8)} ditandai selesai`);
            
            // Ini otomatis trigger 'child_changed' di index.html
            // Karena pake update(), Firebase akan ngirim event child_changed
        } catch (err) {
            console.error(err);
            showToast("❌ Gagal memproses request");
        }
    }

    // ========== TOLAK / HAPUS REQUEST ==========
    async function rejectRequest(id, firebaseKey) {
        try {
            // Hapus dari database
            await requestsRef.child(firebaseKey).remove();
            showToast(`❌ Request ${id.substring(0,8)} ditolak dan dihapus`);
            // Request hilang dari database, index.html gak akan liat request ini lagi
            // Tapi history user tetap ada dengan status 'pending' (bisa ditambahkan opsi rejected)
        } catch (err) {
            console.error(err);
            showToast("❌ Gagal menghapus request");
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // Start
    checkAuth();
</script>
</body>
</html>
